name: Build and Release

on:
  push:
    tags:
      - 'V*'

jobs:
  # ==================== Electron 桌面端构建 ====================
  build:
    name: Build Electron on ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync version with tag (remove 'V' prefix)
        shell: bash
        run: |
          TAG_VERSION=$(echo "${{ github.ref_name }}" | sed 's/^V//')
          npm version --no-git-tag-version "$TAG_VERSION"

      - name: Install dependencies
        run: npm install

      - name: Build Electron app (skip MSI on Windows to avoid WiX error)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            npx electron-builder --win portable nsis --publish never
          else
            npx electron-builder --publish never
          fi

      - name: Upload artifacts to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.msi
            release/*.zip
            release/*.dmg
            release/*.deb
            release/*.AppImage
            release/*.blockmap
            release/latest*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==================== Android APK 构建 ====================
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set version from tag
        shell: bash
        run: |
          TAG_VERSION=$(echo "${{ github.ref_name }}" | sed 's/^V//')
          echo "APP_VERSION=$TAG_VERSION" >> $GITHUB_ENV
          echo "Version set to $TAG_VERSION"

      - name: Setup Capacitor (web-to-mobile)
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android --save-dev

      - name: Prepare web assets for mobile
        run: |
          mkdir -p www
          rsync -av \
            --exclude='www' \
            --exclude='android' \
            --exclude='ios' \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='release' \
            ./ www/

      - name: Initialize Capacitor project
        run: |
          if [ ! -f capacitor.config.ts ] && [ ! -f capacitor.config.json ]; then
            npx cap init "AIChatUI" "com.jhcwcolin.aiui" --web-dir=www
          fi
          if [ ! -d android ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Replace app icon (generate multi-density icons)
        run: |
          sudo apt-get update -y && sudo apt-get install -y imagemagick
          rm -rf android/app/src/main/res/mipmap-anydpi-v26
          find android/app/src/main/res -name "ic_launcher.xml" -delete
          find android/app/src/main/res -name "ic_launcher_foreground.png" -delete
          find android/app/src/main/res -name "ic_launcher_background.xml" -delete

          declare -A sizes=(
            ["mdpi"]="48x48"
            ["hdpi"]="72x72"
            ["xhdpi"]="96x96"
            ["xxhdpi"]="144x144"
            ["xxxhdpi"]="192x192"
          )

          for density in "${!sizes[@]}"; do
            size="${sizes[$density]}"
            convert icon.png -resize "$size" android/app/src/main/res/mipmap-${density}/ic_launcher.png
            echo "Generated ${density} icon (${size})"
          done

      - name: Set APK version
        run: |
          sed -i "s/versionName \"[^\"]*\"/versionName \"$APP_VERSION\"/" android/app/build.gradle
          sed -i "s/versionCode [0-9]*/versionCode $(date +%s)/" android/app/build.gradle

      - name: Fix Kotlin dependency conflict
        run: |
          sed -i '/^allprojects {/,/^}/{
            /^}/i\
            \    configurations.all {\
            \        resolutionStrategy {\
            \            force '\''org.jetbrains.kotlin:kotlin-stdlib:1.8.22'\''\
            \            force '\''org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'\''\
            \            force '\''org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'\''\
            \        }\
            \    }
          }' android/build.gradle

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Locate keystore file
        id: keystore
        run: |
          KEYSTORE=$(find . -maxdepth 1 -type f -name '1*' | head -n 1)
          if [ -z "$KEYSTORE" ]; then
            echo "Error: keystore file not found"
            exit 1
          fi
          echo "keystore-file=$KEYSTORE" >> $GITHUB_OUTPUT

      - name: Extract key alias
        id: alias
        run: |
          ALIAS=$(keytool -list -keystore ./1.keystore \
                  -storepass 20090807 2>/dev/null | \
                  grep -E 'PrivateKeyEntry|keyEntry' | head -n 1 | awk -F, '{print $1}')
          if [ -z "$ALIAS" ]; then
            ALIAS=$(keytool -list -v -keystore ./1.keystore \
                    -storepass 20090807 2>/dev/null | \
                    grep "Alias name:" | head -n 1 | sed 's/Alias name: //')
          fi
          if [ -z "$ALIAS" ]; then
            echo "Error: Could not determine key alias"
            exit 1
          fi
          echo "alias=$ALIAS" >> $GITHUB_OUTPUT

      - name: Copy keystore
        run: cp ./1.keystore android/app/1.keystore

      - name: Build Release APK (signed)
        env:
          STORE_PASS: 20090807
          KEY_ALIAS: ${{ steps.alias.outputs.alias }}
          KEY_PASS: 20090807
          KEYSTORE_FILE: ${{ github.workspace }}/android/app/1.keystore
        run: |
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$KEYSTORE_FILE" \
            -Pandroid.injected.signing.store.password="$STORE_PASS" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASS"

      - name: Rename APK
        run: |
          cd android/app/build/outputs/apk/release
          APK_FILE=$(ls *.apk | head -n1)
          NEW_NAME="AIChatUI-${APP_VERSION}-android.apk"
          mv "$APK_FILE" "$NEW_NAME"

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/AIChatUI-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==================== iOS Simulator 构建（修复部署目标） ====================
  build-ios-simulator:
    name: Build iOS Simulator app
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set version from tag
        shell: bash
        run: |
          TAG_VERSION=$(echo "${{ github.ref_name }}" | sed 's/^V//')
          echo "APP_VERSION=$TAG_VERSION" >> $GITHUB_ENV
          echo "Version set to $TAG_VERSION"

      - name: Setup Capacitor (web-to-mobile) for iOS
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios --save-dev

      - name: Prepare web assets for mobile
        run: |
          mkdir -p www
          rsync -av \
            --exclude='www' \
            --exclude='android' \
            --exclude='ios' \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='release' \
            ./ www/

      - name: Initialize Capacitor project (iOS)
        run: |
          if [ ! -f capacitor.config.ts ] && [ ! -f capacitor.config.json ]; then
            npx cap init "AIChatUI" "com.jhcwcolin.aiui" --web-dir=www
          fi
          if [ ! -d ios ]; then
            npx cap add ios || echo "Capacitor iOS add had warnings, continuing"
          fi
          # 仅复制 web 资源，不触发 pod install
          npx cap copy ios

      - name: Fix iOS deployment target and install pods
        run: |
          # 确保 Podfile 存在并提高部署目标到 14.0（满足 Capacitor 最新版要求）
          if [ -f ios/App/Podfile ]; then
            sed -i '' 's/^platform :ios, '\''[0-9.]*'\''/platform :ios, '\''14.0'\''/' ios/App/Podfile
          else
            # 极少数情况可能没有，手动生成 Podfile
            cd ios/App && pod init
            sed -i '' 's/^platform :ios, '\''[0-9.]*'\''/platform :ios, '\''14.0'\''/' Podfile
          fi
          # 安装 CocoaPods 依赖
          cd ios/App && pod install --repo-update

      # 安装 ImageMagick 并生成多尺寸 iOS 图标，替换默认资源
      - name: Generate iOS icons from icon.png
        run: |
          brew install imagemagick

          # 目标 assets 目录
          ICON_DIR="ios/App/App/Assets.xcassets/AppIcon.appiconset"

          # 删除原有默认图标文件
          rm -f $ICON_DIR/*.png

          # iOS 模拟器常用图标尺寸（单倍、2x、3x）以及 App Store 尺寸（用于占位）
          convert icon.png -resize 20x20   $ICON_DIR/Icon-App-20x20@1x.png
          convert icon.png -resize 40x40   $ICON_DIR/Icon-App-20x20@2x.png
          convert icon.png -resize 60x60   $ICON_DIR/Icon-App-20x20@3x.png
          convert icon.png -resize 29x29   $ICON_DIR/Icon-App-29x29@1x.png
          convert icon.png -resize 58x58   $ICON_DIR/Icon-App-29x29@2x.png
          convert icon.png -resize 87x87   $ICON_DIR/Icon-App-29x29@3x.png
          convert icon.png -resize 40x40   $ICON_DIR/Icon-App-40x40@1x.png
          convert icon.png -resize 80x80   $ICON_DIR/Icon-App-40x40@2x.png
          convert icon.png -resize 120x120 $ICON_DIR/Icon-App-40x40@3x.png
          convert icon.png -resize 120x120 $ICON_DIR/Icon-App-60x60@2x.png
          convert icon.png -resize 180x180 $ICON_DIR/Icon-App-60x60@3x.png
          convert icon.png -resize 76x76   $ICON_DIR/Icon-App-76x76@1x.png
          convert icon.png -resize 152x152 $ICON_DIR/Icon-App-76x76@2x.png
          convert icon.png -resize 167x167 $ICON_DIR/Icon-App-83.5x83.5@2x.png
          convert icon.png -resize 1024x1024 $ICON_DIR/Icon-App-1024x1024@1x.png

          # 更新 Contents.json 以匹配新图标
          cat > $ICON_DIR/Contents.json << 'EOF'
          {
            "images" : [
              {"idiom" : "iphone","scale" : "1x","size" : "20x20","filename" : "Icon-App-20x20@1x.png"},
              {"idiom" : "iphone","scale" : "2x","size" : "20x20","filename" : "Icon-App-20x20@2x.png"},
              {"idiom" : "iphone","scale" : "3x","size" : "20x20","filename" : "Icon-App-20x20@3x.png"},
              {"idiom" : "iphone","scale" : "1x","size" : "29x29","filename" : "Icon-App-29x29@1x.png"},
              {"idiom" : "iphone","scale" : "2x","size" : "29x29","filename" : "Icon-App-29x29@2x.png"},
              {"idiom" : "iphone","scale" : "3x","size" : "29x29","filename" : "Icon-App-29x29@3x.png"},
              {"idiom" : "iphone","scale" : "1x","size" : "40x40","filename" : "Icon-App-40x40@1x.png"},
              {"idiom" : "iphone","scale" : "2x","size" : "40x40","filename" : "Icon-App-40x40@2x.png"},
              {"idiom" : "iphone","scale" : "3x","size" : "40x40","filename" : "Icon-App-40x40@3x.png"},
              {"idiom" : "iphone","scale" : "2x","size" : "60x60","filename" : "Icon-App-60x60@2x.png"},
              {"idiom" : "iphone","scale" : "3x","size" : "60x60","filename" : "Icon-App-60x60@3x.png"},
              {"idiom" : "ipad","scale" : "1x","size" : "20x20","filename" : "Icon-App-20x20@1x.png"},
              {"idiom" : "ipad","scale" : "2x","size" : "20x20","filename" : "Icon-App-20x20@2x.png"},
              {"idiom" : "ipad","scale" : "1x","size" : "29x29","filename" : "Icon-App-29x29@1x.png"},
              {"idiom" : "ipad","scale" : "2x","size" : "29x29","filename" : "Icon-App-29x29@2x.png"},
              {"idiom" : "ipad","scale" : "1x","size" : "40x40","filename" : "Icon-App-40x40@1x.png"},
              {"idiom" : "ipad","scale" : "2x","size" : "40x40","filename" : "Icon-App-40x40@2x.png"},
              {"idiom" : "ipad","scale" : "1x","size" : "76x76","filename" : "Icon-App-76x76@1x.png"},
              {"idiom" : "ipad","scale" : "2x","size" : "76x76","filename" : "Icon-App-76x76@2x.png"},
              {"idiom" : "ipad","scale" : "2x","size" : "83.5x83.5","filename" : "Icon-App-83.5x83.5@2x.png"},
              {"idiom" : "ios-marketing","scale" : "1x","size" : "1024x1024","filename" : "Icon-App-1024x1024@1x.png"}
            ],
            "info" : {
              "version" : 1,
              "author" : "xcode"
            }
          }
          EOF

          echo "iOS icons generated."

      - name: Build iOS Simulator .app
        run: |
          xcodebuild -workspace ios/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath ./ios-build \
            build

      - name: Package Simulator .app into zip
        run: |
          cd ios-build/Build/Products/Debug-iphonesimulator
          ZIPNAME="AIChatUI-${APP_VERSION}-ios-simulator.zip"
          zip -r "$GITHUB_WORKSPACE/$ZIPNAME" App.app

      - name: Upload iOS Simulator zip to Release
        uses: softprops/action-gh-release@v2
        with:
          files: AIChatUI-*-ios-simulator.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
